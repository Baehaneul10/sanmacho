# 예시: 정적 SPA + API (외부 접속)
# - server 블록의 server_name, root, SSL 경로를 실제 값으로 바꾸세요.
# - API는 Node가 0.0.0.0:3000 에 떠 있어야 합니다.

# HTTP → HTTPS 리다이렉트 (Let's Encrypt 등 사용 시)
# server {
#     listen 80;
#     server_name yourdomain.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;
    server_name yourdomain.com;

    # ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    root /var/www/portfolio-site/dist;
    index index.html;

    location /portfolio-site/ {
        alias /var/www/portfolio-site/dist/;
        try_files $uri $uri/ /portfolio-site/index.html;
    }

    # SPA base를 '/' 로 쓰는 경우:
    # location / {
    #     try_files $uri $uri/ /index.html;
    # }

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
